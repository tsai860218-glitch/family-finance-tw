        <button class="pool-tx-del" onclick="delPoolTx('${key}','${memberId||''}',${tx._idx})">×</button>
      </div>`).join('');
    return `<div class="pool-card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div>
          <div style="font-size:14px;font-weight:500;color:var(--text)">${label}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">
            存入 ${fmt(mIn)} · 取用 ${fmt(mOut)} · 
            <span style="color:${mBal>=0?'var(--green)':'var(--red)'}">${mBal>=0?'+':''}${fmt(mBal)}</span>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;color:var(--text3)">累計餘額</div>
          <div style="font-size:15px;font-weight:500;color:${cumBal>=0?'var(--green)':'var(--red)'}">${fmt(cumBal)}</div>
        </div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:8px">${rows}</div>
    </div>`;
  }).join('') : '<div style="font-size:13px;color:var(--text3);text-align:center;padding:1.5rem 0">尚無記錄<br><span style="font-size:12px">點「存入」開始記錄盈餘</span></div>';

  document.getElementById('pool_body').innerHTML=`
    <div class="pool-card" style="margin-bottom:1rem">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-size:20px">${icon}</span>

      </div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px">累計總餘額</div>
      <div class="pool-balance ${totalBalance>=0?'pos':'neg'}">${totalBalance>=0?'':'-'}${fmt(Math.abs(totalBalance))}</div>
      ${suggestSurplus>0?`<div style="font-size:12px;color:var(--green-text);background:var(--green-bg);padding:7px 10px;border-radius:var(--radius-sm);margin-bottom:10px">

function confirmPoolTx(key, memberId, type){
  const amount=parseFloat(document.getElementById('pool_amt').value)||0;
  const date=document.getElementById('pool_date').value;
  const note=document.getElementById('pool_note').value.trim();
  if(!amount){alert('請輸入金額');return;}

  const sp=window.surplusPool;
  const tx={type,amount,date,note,id:Date.now()};
  const isFamily=key==='family';

  if(isFamily){
    if(!sp.family) sp.family=[];
    if(type==='out'){
      const bal=sp.family.reduce((s,t)=>s+(t.type==='in'?t.amount:-t.amount),0);
      if(amount>bal){alert(`家庭池餘額不足！目前餘額 ${fmt(bal)}`);return;}
    }
    sp.family.push(tx);
  } else {
    if(!sp.members) sp.members={};
    if(!sp.members[memberId]) sp.members[memberId]=[];
    if(type==='out'){
      const bal=(sp.members[memberId]||[]).reduce((s,t)=>s+(t.type==='in'?t.amount:-t.amount),0);
      if(amount>bal){alert(`個人池餘額不足！目前餘額 ${fmt(bal)}`);return;}
    }
    sp.members[memberId].push(tx);
  }

  if(type==='out'){
    const createRec=document.getElementById('pool_create_rec')?.checked;
    if(createRec){
      const person=document.getElementById('pool_rec_person')?.value||window.members[0]?.id||'A';
      window.fbAddRecord({type:'expense',person,category:'盈餘池取用',amount,note:note||'盈餘池取用',date});
    }
  }

  window.fbSavePool();
  closeModal(null,true);
  showToast(type==='in'?`已存入 ${fmt(amount)}`:`已取用 ${fmt(amount)}`);
  renderPool();
}
window.confirmPoolTx=confirmPoolTx;

function delPoolTx(key, memberId, idx){

  const sp=window.surplusPool;
  if(key==='family') sp.family.splice(idx,1);
  else if(sp.members&&sp.members[memberId]) sp.members[memberId].splice(idx,1);
  window.fbSavePool();
  renderPool();
}

}
function daysHintHTML(spent, budget, catId){
  if(!budget||budget<=0) return '';
  const cat=window.cats.find(c=>c.id===catId);
  if(cat&&cat.showHint===false) return '';
  const remain=budget-spent;
  if(remain<0) return `<div class="days-hint danger">已超出預算 ${fmt(Math.abs(remain))}</div>`;
  if(remain===0) return `<div class="days-hint warn">已達預算上限</div>`;
  return '';
}

/* ══ 趨勢箭頭 ══ */
function trendHTML(curAmt, catName){
  const now=new Date();
  const y=curMonth.getFullYear(), m=curMonth.getMonth();
  const prevD=new Date(y,m-1,1);
  const prevRecs=getRecsYM(prevD.getFullYear(),prevD.getMonth());
  const prevAmt=prevRecs.filter(r=>r.type==='expense'&&r.category===catName).reduce((s,r)=>s+r.amount,0);
  if(!prevAmt) return '';
  const diff=curAmt-prevAmt;
  if(Math.abs(diff)<prevAmt*0.05) return '<span class="trend-flat">→</span>';
  return diff>0
    ? `<span class="trend-up">↑${Math.round(diff/prevAmt*100)}%</span>`
    : `<span class="trend-down">↓${Math.round(Math.abs(diff)/prevAmt*100)}%</span>`;
}

/* ══ 備註建議 ══ */
function showNoteSugs(){
  const input=document.getElementById('aNote');
  const cat=document.getElementById('aCat')?.value||'';
  const val=(input?.value||'').toLowerCase();
  const el=document.getElementById('noteSugs');
  if(!el||!input) return;
  // 從歷史記錄收集備註
  const allNotes=window.records
    .filter(r=>r.note&&(!cat||r.category===cat))
    .map(r=>r.note)
    .filter((n,i,a)=>n&&a.indexOf(n)===i)
    .filter(n=>!val||n.toLowerCase().includes(val))
    .slice(0,6);
  el.innerHTML=allNotes.map(n=>
    `<button type="button" class="note-sug" onclick="applyNoteSug('${n.replace(/'/g,"\'")}')">
      ${n}
    </button>`).join('');
}
function applyNoteSug(note){
  const el=document.getElementById('aNote');
  if(el){ el.value=note; document.getElementById('noteSugs').innerHTML=''; }
}
window.showNoteSugs=showNoteSugs;
window.applyNoteSug=applyNoteSug;

/* ══ 記帳記憶上次成員+分類 ══ */
function saveLastRecord(person){
  try{ localStorage.setItem('lastPerson', person); }catch(e){}
}
function getLastRecord(){
  try{ return {person:localStorage.getItem('lastPerson')}; }
  catch(e){ return {}; }
}
function saveLastRecPerson(person){
  try{ localStorage.setItem('lastRecPerson', person); }catch(e){}
}
function getLastRecPerson(){
  try{ return localStorage.getItem('lastRecPerson')||'all'; }catch(e){ return 'all'; }
}

/* ══ 固定支出自動記帳 ══ */
function getAutoRecs(){ try{ return JSON.parse(localStorage.getItem('autoRecs')||'[]'); }catch(e){return [];} }
function saveAutoRecs(arr){ try{ localStorage.setItem('autoRecs', JSON.stringify(arr)); }catch(e){} }

function renderAutoRecList(){
  const el=document.getElementById('auto_rec_list'); if(!el) return;
  const list=getAutoRecs();
  if(!list.length){
    el.innerHTML=emptyHTML('🔄','尚無自動記帳項目','新增後每月開啟 App 時自動提示');
    return;
  }
  el.innerHTML=list.map((a,i)=>{
    const cat=window.cats.find(c=>c.name===a.category);
    const mem=window.members.find(m=>m.id===a.person);
    return `<div class="auto-item">
      <span style="font-size:18px">${cat?cat.icon:'📝'}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;color:var(--text)">${a.note||a.category}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${mem?mem.avatar+' '+mem.name:a.person} · ${a.category} · 每月 ${a.day} 號 · ${fmt(a.amount)}</div>
      </div>
      <span class="auto-badge">每月</span>
      <button class="btn del sm" onclick="delAutoRec(${i})">刪除</button>
    </div>`;
  }).join('');
}
window.renderAutoRecList=renderAutoRecList;

function delAutoRec(idx){
  if(!confirm('確定刪除？'))return;
  const list=getAutoRecs(); list.splice(idx,1); saveAutoRecs(list);
  renderAutoRecList();
}
window.delAutoRec=delAutoRec;

function openAutoRecModal(){
  const catOpts=window.cats.map(c=>`<option value="${c.name}">${c.icon} ${c.name}</option>`).join('');
  const memOpts=window.members.map(m=>`<option value="${m.id}">${m.avatar} ${m.name}</option>`).join('');
  const days=Array.from({length:28},(_,i)=>`<option value="${i+1}">${i+1} 號</option>`).join('');
  document.getElementById('modal_root').innerHTML=`
    <div class="modal-bg" onclick="closeModal(event)">
      <div class="modal-box">
        <div class="modal-hd"><span class="modal-title">新增自動記帳項目</span><button class="modal-close" onclick="closeModal(null,true)">×</button></div>
        <div class="fr" style="margin-bottom:10px">
          <div class="fg"><label>成員</label><select id="ar_person">${memOpts}</select></div>
          <div class="fg"><label>每月幾號</label><select id="ar_day">${days}</select></div>
        </div>
        <div class="fr" style="margin-bottom:10px">
          <div class="fg"><label>分類</label><select id="ar_cat">${catOpts}</select></div>
          <div class="fg"><label>金額（NT$）</label><input type="tel" id="ar_amt" placeholder="0" inputmode="decimal"></div>
        </div>
        <div class="fg" style="margin-bottom:14px">
          <label>說明</label>
          <input type="text" id="ar_note" placeholder="例：房租、保險費">
        </div>
        <button class="btn pri" style="width:100%" onclick="confirmAutoRec()">確認新增</button>
      </div>
    </div>`;
}
window.openAutoRecModal=openAutoRecModal;

function confirmAutoRec(){
  const person=document.getElementById('ar_person').value;
  const day=parseInt(document.getElementById('ar_day').value);
  const category=document.getElementById('ar_cat').value;
  const amount=parseFloat(document.getElementById('ar_amt').value)||0;
  const note=document.getElementById('ar_note').value.trim();
  if(!amount){alert('請輸入金額');return;}
  const list=getAutoRecs();
  list.push({person,day,category,amount,note});
  saveAutoRecs(list);
  closeModal(null,true);
  renderAutoRecList();
  showToast('已新增自動記帳項目！');
}
window.confirmAutoRec=confirmAutoRec;

function checkAutoRecs(){
  const list=getAutoRecs(); if(!list.length) return;
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const done=JSON.parse(localStorage.getItem('autoRecDone_'+ym)||'[]');
  const pending=list.reduce((acc,a,i)=>{
    if(!done.includes(i)&&now.getDate()>=a.day) acc.push({a,i});
    return acc;
  },[]);
  if(!pending.length) return;
  const rows=pending.map(({a,i})=>{
    const cat=window.cats.find(c=>c.name===a.category);
    const mem=window.members.find(m=>m.id===a.person);
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:20px">${cat?cat.icon:'📝'}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:500;color:var(--text)">${a.note||a.category}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${mem?mem.avatar+' '+mem.name:a.person} · ${a.category} · ${a.day}號</div>
      </div>
      <div style="font-size:15px;font-weight:500;color:var(--red);flex-shrink:0;margin-right:8px">-${fmt(a.amount)}</div>
      <button class="btn sm pri" onclick="doAutoRec(${i},'${ym}')">記帳</button>
    </div>`;
  }).join('');
  document.getElementById('modal_root').innerHTML=`
    <div class="modal-bg" onclick="closeModal(event)">
      <div class="modal-box">
        <div class="modal-hd">
          <span class="modal-title">📋 本月固定支出</span>
          <button class="modal-close" onclick="closeModal(null,true)">×</button>
        </div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:10px">以下項目已到期，請確認記帳</div>
        <div style="margin-bottom:14px">${rows}</div>
        <div style="display:flex;gap:8px">
          <button class="btn pri" style="flex:1" onclick="doAllAutoRec(${JSON.stringify(pending.map(p=>p.i))},'${ym}')">全部記帳</button>
          <button class="btn" style="flex:1" onclick="closeModal(null,true)">稍後再說</button>
        </div>
      </div>
    </div>`;
}
window.checkAutoRecs=checkAutoRecs;

function doAutoRec(idx, ym){
  const a=getAutoRecs()[idx]; if(!a) return;
  const now=new Date();
  const date=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(a.day).padStart(2,'0')}`;
  window.fbAddRecord({type:'expense',person:a.person,category:a.category,amount:a.amount,note:a.note||a.category,date});
  const done=JSON.parse(localStorage.getItem('autoRecDone_'+ym)||'[]');
  done.push(idx);
  localStorage.setItem('autoRecDone_'+ym, JSON.stringify(done));
  showToast(`✓ 已記帳：${a.note||a.category} ${fmt(a.amount)}`);
  closeModal(null,true);
  setTimeout(checkAutoRecs, 400);
}
window.doAutoRec=doAutoRec;

function doAllAutoRec(idxArr, ym){
  const list=getAutoRecs();
  const now=new Date();
  const done=JSON.parse(localStorage.getItem('autoRecDone_'+ym)||'[]');
  idxArr.forEach(i=>{
    const a=list[i]; if(!a) return;
    const date=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(a.day).padStart(2,'0')}`;
    window.fbAddRecord({type:'expense',person:a.person,category:a.category,amount:a.amount,note:a.note||a.category,date});
    done.push(i);
  });
  localStorage.setItem('autoRecDone_'+ym, JSON.stringify(done));
  closeModal(null,true);
  showToast(`✓ 已記帳 ${idxArr.length} 筆固定支出`);
}
window.doAllAutoRec=doAllAutoRec;

  window.updateMonthLabel();
  if(activeTab==='ov'){ renderSummaryCard(); renderOverview(); }
  else if(activeTab==='yr') renderYearly();
  else if(activeTab==='bud') renderBudget();
  else if(activeTab==='rec') renderRec();
  else if(activeTab==='mem') renderMembers();
  else if(activeTab==='pool') renderPool();
};
window.addEventListener('online',()=>document.getElementById('sd').classList.remove('off'));
window.addEventListener('offline',()=>document.getElementById('sd').classList.add('off'));
window.updateMonthLabel();
