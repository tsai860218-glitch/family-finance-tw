<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭理財紀錄</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, push, remove }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyAqfmw0Valf69ZfIbq4Ftf8hb269ayqNak",
    authDomain:        "family-finance-b2875.firebaseapp.com",
    databaseURL:       "https://family-finance-b2875-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "family-finance-b2875",
    storageBucket:     "family-finance-b2875.firebasestorage.app",
    messagingSenderId: "262871982250",
    appId:             "1:262871982250:web:f4b14b314b19c3ee99b0d3"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const DEF_MEMBERS = [
    { id:"A", name:"成員 A", avatar:"🐱" },
    { id:"B", name:"成員 B", avatar:"🐶" }
  ];
  /* type: "fixed" 固定支出 | "variable" 不固定支出 */
  const DEF_CATS = [
    { id:"c1", icon:"🏠", name:"房租/水電/管理費", type:"fixed",    order:0 },
    { id:"c2", icon:"🛡️", name:"保險",             type:"fixed",    order:1 },
    { id:"c3", icon:"📡", name:"網路費",           type:"fixed",    order:2 },
    { id:"c4", icon:"💳", name:"信用卡",           type:"fixed",    order:3 },
    { id:"c5", icon:"🍱", name:"伙食",             type:"variable", order:4 },
    { id:"c6", icon:"🚗", name:"交通",             type:"variable", order:5 },
    { id:"c7", icon:"🛒", name:"家用",             type:"variable", order:6 },
  ];

  window._db=db; window._ref=ref; window._set=set; window._push=push; window._remove=remove;
  window.members=[]; window.cats=[]; window.records=[];
  window.monthBudgets={}; window.quickItems={}; window.surplusPool={};
  window.fbReady=false;
  window._loaded={members:false,cats:false,records:false};

  function tryFirstRender(){
    if(window.fbReady) return;
    if(!window._loaded.members||!window._loaded.cats||!window._loaded.records) return;
    window.fbReady=true;
    document.getElementById("lo").style.display="none";
    window.updateMonthLabel();
    // 恢復上次頁籤
    try{
      const lastTab=localStorage.getItem('lastTab');
      if(lastTab&&lastTab!=='add'&&['ov','yr','bud','rec','mem','pool'].includes(lastTab)){
        goTab(lastTab); return;
      }
    }catch(e){}
    try{window.renderSummaryCard();}catch(e){console.warn('summary',e);}
    try{window.renderOverview();}catch(e){console.warn('overview',e);}
    try{checkAutoRecs();}catch(e){}
  }

  onValue(ref(db,"members"), snap=>{
    window.members = snap.val() ? Object.values(snap.val()) : DEF_MEMBERS;
    if(!snap.val()) set(ref(db,"members"), Object.fromEntries(DEF_MEMBERS.map(m=>[m.id,m])));
    window._loaded.members=true;
    if(window.fbReady) window.updateAll();
    else tryFirstRender();
  });
  onValue(ref(db,"cats"), snap=>{
    window.cats = snap.val() ? Object.values(snap.val()) : DEF_CATS;
    if(!snap.val()) set(ref(db,"cats"), Object.fromEntries(DEF_CATS.map(c=>[c.id,c])));
    window._loaded.cats=true;
    if(window.fbReady) window.updateAll();
    else tryFirstRender();
  });
  onValue(ref(db,"monthBudgets"), snap=>{
    window.monthBudgets = snap.val() || {};
    if(window.fbReady) window.updateAll();
  });
  onValue(ref(db,"quickItems"), snap=>{
    window.quickItems = snap.val() || {};
    if(window.fbReady && window.activeTab==='add') window.renderAddForm();
  });
  onValue(ref(db,"surplusPool"), snap=>{
    window.surplusPool = snap.val() || {family:[], members:{}};
    if(!window.surplusPool.family) window.surplusPool.family=[];
    if(!window.surplusPool.members) window.surplusPool.members={};
    if(window.fbReady && window.activeTab==='pool') renderPool();
  });
  onValue(ref(db,"records"), snap=>{
    window.records = snap.val() ? Object.values(snap.val()) : [];
    window._loaded.records=true;
    if(window.fbReady) window.updateAll();
    else tryFirstRender();
  });

  window.fbSaveMembers     = ()=> set(ref(db,"members"),      Object.fromEntries(window.members.map(m=>[m.id,m])));
  window.fbSaveCats        = ()=> set(ref(db,"cats"),         Object.fromEntries(window.cats.map(c=>[c.id,c])));
  window.fbSaveMonthBudget = (ym,data)=> set(ref(db,`monthBudgets/${ym}`),data);
  window.fbAddRecord       = (rec)=>{ const k=push(ref(db,"records")).key; rec.id=k; set(ref(db,`records/${k}`),rec); };
  window.fbDelRecord       = (id)=> remove(ref(db,`records/${id}`));
  window.fbUpdateRecord    = (id,data)=> set(ref(db,`records/${id}`),data);
  window.fbSaveQuickItems  = ()=> set(ref(db,"quickItems"), window.quickItems);
  window.fbSavePool        = ()=> set(ref(db,"surplusPool"), window.surplusPool);

</script>
<style>
:root{
  --bg:#faf7f2;--surface:#fff;--surface2:#f5f2ec;
  --border:#ede9e2;--border2:#e0dbd2;
  --text:#1a1a1a;--text2:#6b6560;--text3:#b0aaa0;
  --orange:#f5a623;--orange-bg:#fff8ee;--orange-text:#c47d00;
  --orange-dark:#e8901a;
  --green:#0f8a5f;--green-bg:#edf8f4;--green-text:#0a7048;
  --red:#c94a20;--red-bg:#fff0ee;--red-text:#a03010;
  --purple:#534AB7;--purple-bg:#f0eeff;--purple-text:#3d35a0;
  --blue:#1557a0;--blue-bg:#e6f0fb;--blue-text:#0c3d78;
  --amber:#a06010;--amber-bg:#fff8ee;--amber-text:#7a4a05;
  --radius:20px;--radius-sm:12px;--radius-pill:99px;
  --shadow:0 1px 4px rgba(0,0,0,.05);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]){
    --bg:#1a1714;--surface:#252220;--surface2:#2e2b27;
    --border:#3a3630;--border2:#4a4640;
    --text:#f0ece5;--text2:#a09890;--text3:#6a6460;
    --orange:#f5a623;--orange-bg:#2a2010;--orange-text:#f5a623;
    --green:#30d158;--green-bg:#0d2e1a;--green-text:#30d158;
    --red:#ff6b6b;--red-bg:#2e1010;--red-text:#ff8888;
    --purple:#9f97f0;--purple-bg:#1e1a3a;--purple-text:#c0bbf8;
    --shadow:0 1px 4px rgba(0,0,0,.3);--shadow-md:0 4px 16px rgba(0,0,0,.4);
  }
}
:root[data-theme="dark"]{
  --bg:#1a1714;--surface:#252220;--surface2:#2e2b27;
  --border:#3a3630;--border2:#4a4640;
  --text:#f0ece5;--text2:#a09890;--text3:#6a6460;
  --orange:#f5a623;--orange-bg:#2a2010;--orange-text:#f5a623;
  --green:#30d158;--green-bg:#0d2e1a;--green-text:#30d158;
  --red:#ff6b6b;--red-bg:#2e1010;--red-text:#ff8888;
  --purple:#9f97f0;--purple-bg:#1e1a3a;--purple-text:#c0bbf8;
  --shadow:0 1px 4px rgba(0,0,0,.3);--shadow-md:0 4px 16px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ─ 載入 ─ */
#lo{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;font-size:14px;color:var(--text3)}
.spin{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ─ 레이아웃 ─ */
.wrap{max-width:680px;margin:0 auto;padding:0 1rem 5.5rem}

/* ─ 헤더 ─ */
.header{position:sticky;top:0;z-index:100;background:var(--bg);padding:1rem 0 .75rem}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:20px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;letter-spacing:-.3px}
.app-title em{color:var(--orange);font-style:normal}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.sdot.off{background:var(--red)}
.mnav{display:flex;align-items:center;gap:6px}
.mnav button{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-pill);padding:5px 10px;cursor:pointer;font-size:14px;font-family:inherit;color:var(--text2);transition:background .15s;box-shadow:var(--shadow)}
.mnav button:hover{background:var(--surface2)}
.mlbl{font-size:13px;font-weight:600;min-width:90px;text-align:center;color:var(--text)}

/* ─ 底部導航（新設計）─ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:0.5px solid var(--border);display:flex;align-items:flex-end;z-index:200;padding-bottom:env(safe-area-inset-bottom,0);box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 10px;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--text3);font-size:9px;gap:4px;transition:color .15s;min-height:54px;font-weight:500}
.bnav-btn.on{color:var(--orange)}
.bnav-icon{font-size:20px;line-height:1}
.bnav-icon-wrap{width:38px;height:38px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:19px}
.bnav-btn.on .bnav-icon-wrap{background:var(--orange-bg)}

/* 中央 FAB */
.bnav-fab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding-bottom:8px;cursor:pointer;border:none;background:none;font-family:inherit;margin-top:-16px}
.bnav-fab-circle{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#ff8c69,#f5a623);box-shadow:0 4px 14px rgba(245,120,35,.45);display:flex;align-items:center;justify-content:center;font-size:22px;border:3px solid var(--bg);transition:transform .15s}
.bnav-fab-circle:active{transform:scale(.94)}
.bnav-fab-label{font-size:9px;color:var(--orange);font-weight:700}

/* ─ Bento 卡片 ─ */
.bento{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.bcard{border-radius:var(--radius);padding:14px;position:relative;overflow:hidden}
.bcard-w2{grid-column:1/-1}
.bcard-white{background:var(--surface);border:0.5px solid var(--border);box-shadow:var(--shadow)}
.bcard-hero{background:linear-gradient(135deg,#ffb347 0%,#f5a623 45%,#ff8c69 100%);box-shadow:0 6px 20px rgba(245,166,35,.3)}
.bcard-lavender{background:var(--purple-bg);border:0.5px solid #d8d0f8}
.bcard-mint{background:var(--green-bg);border:0.5px solid #c0e8d8}
.bcard-cream{background:var(--orange-bg);border:0.5px solid #f5e8cc}
.bcard-rose{background:#fff0f3;border:0.5px solid #f8d0d8}
.bcard-deco{position:absolute;right:-6px;bottom:-6px;font-size:52px;opacity:.14;line-height:1;pointer-events:none;user-select:none}
.bc-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.04em;margin-bottom:4px}
.bc-val{font-size:22px;font-weight:700;letter-spacing:-.4px;line-height:1.1;color:var(--text)}
.bc-val.org{color:var(--orange)}.bc-val.grn{color:var(--green)}.bc-val.pur{color:var(--purple)}.bc-val.red{color:var(--red)}
.bc-sub{font-size:10px;color:var(--text3);margin-top:3px}
.bc-pill{display:inline-block;font-size:9px;padding:3px 8px;border-radius:99px;font-weight:600;margin-top:7px}
.bc-pill-o{background:rgba(245,166,35,.15);color:var(--orange-text)}
.bc-pill-g{background:rgba(15,138,95,.12);color:var(--green-text)}
.bc-pill-p{background:rgba(83,74,183,.12);color:var(--purple-text)}
.bc-pill-r{background:rgba(201,74,32,.1);color:var(--red-text)}
.bc-prog{height:5px;background:rgba(0,0,0,.07);border-radius:99px;overflow:hidden;margin-top:8px}
.bc-prog-fill{height:5px;border-radius:99px;transition:width .4s ease}

/* Hero 卡內容 */
.hero-lbl{font-size:11px;color:rgba(255,255,255,.75);margin-bottom:4px}
.hero-val{font-size:26px;font-weight:700;color:#fff;letter-spacing:-.5px;line-height:1}
.hero-sub{font-size:10px;color:rgba(255,255,255,.65);margin-top:3px}
.hero-chips{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.hero-chip{background:rgba(255,255,255,.22);border-radius:99px;padding:4px 10px;font-size:10px;color:#fff;font-weight:500}
.hero-row{display:flex;align-items:center;justify-content:space-between;gap:10px}

/* 摘要卡區 */
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.met{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;box-shadow:var(--shadow)}
.ml{font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:500}
.mv{font-size:20px;font-weight:700;letter-spacing:-.3px}
.mv.g{color:var(--green)}.mv.r{color:var(--red)}.mv.b{color:var(--blue)}.mv.o{color:var(--orange)}

/* ─ 通用卡片 ─ */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:10px;box-shadow:var(--shadow)}
.card-accent{border-left-width:3px}
.sh{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.sh-row{display:flex;align-items:center;gap:8px;margin:1.25rem 0 10px}
.sh-row .sh{margin:0}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px}
.badge-fixed{background:var(--blue-bg);color:var(--blue-text)}
.badge-var{background:var(--green-bg);color:var(--green-text)}

/* ─ 進度 ─ */
.pw{flex:1;background:var(--surface2);border-radius:99px;height:5px;min-width:40px;overflow:hidden}
.pb{height:5px;border-radius:99px;transition:width .4s ease}

/* ─ 按鈕 ─ */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;transition:background .15s;box-shadow:var(--shadow)}
.btn:hover{background:var(--surface2)}
.btn.pri{background:var(--orange);color:#fff;border-color:var(--orange-dark);box-shadow:0 2px 8px rgba(245,166,35,.3)}
.btn.pri:hover{background:var(--orange-dark)}
.btn.del{color:var(--red);border-color:#f0b0a0}
.btn.del:hover{background:var(--red-bg)}
.btn.sm{padding:5px 11px;font-size:12px}

/* ─ 폼 ─ */
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.fr.t3{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.02em}
.fg input,.fg select{font-size:13px;padding:9px 11px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;transition:border-color .15s}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--orange)}
.bi{font-size:13px;width:95px;padding:6px 9px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit}
.bi.warn{border-color:var(--red);background:var(--red-bg)}
.bi:focus{outline:none;border-color:var(--orange)}

/* ─ 記錄行 ─ */
.rrow-wrap{position:relative;overflow:hidden;border-radius:var(--radius);margin-bottom:7px}
.rrow-del-bg{position:absolute;right:0;top:0;bottom:0;width:70px;background:var(--red);display:flex;align-items:center;justify-content:center;border-radius:var(--radius)}
.rrow-del-bg button{background:none;border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;padding:0 12px}
.rrow{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);position:relative;transition:transform .2s ease;cursor:pointer}
.rrow:active{background:var(--surface2)}

/* ─ 태그 ─ */
.tag{display:inline-block;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:500}
.ti{background:var(--green-bg);color:var(--green-text)}
.te{background:var(--red-bg);color:var(--red-text)}

/* ─ 알림 ─ */
.al{border-radius:var(--radius-sm);padding:11px 14px;font-size:13px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;line-height:1.6}
.alw{background:var(--amber-bg);color:var(--amber-text);border:0.5px solid #e8c060}
.alo{background:var(--green-bg);color:var(--green-text);border:0.5px solid #80d4b0}
.ali{font-size:14px;flex-shrink:0;margin-top:1px}

/* ─ 예산 ─ */
.btbar{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px}
.btr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;flex-wrap:wrap;gap:4px}
.btl{font-size:12px;color:var(--text2)}
.btv{font-size:13px;font-weight:600}
.btrack{background:var(--border);border-radius:99px;height:6px;overflow:hidden}
.bfill{height:6px;border-radius:99px;transition:width .4s ease}
.bud-section{margin-bottom:1.5rem}

/* ─ 연도 ─ */
.ygrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1.25rem}
.ym{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;box-shadow:var(--shadow)}
.yml{font-size:11px;color:var(--text3);margin-bottom:5px}
.ymv{font-size:18px;font-weight:700;letter-spacing:-.3px}
.mrow{display:flex;align-items:center;border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:7px;box-shadow:var(--shadow)}
.mrow.ob{border-color:#e8c060}
.mrm{padding:10px 12px;font-size:13px;font-weight:600;background:var(--surface2);min-width:48px;flex-shrink:0}
.mrd{display:flex;flex:1;padding:8px 10px;gap:10px;flex-wrap:wrap;align-items:center}
.mri{display:flex;flex-direction:column;gap:1px}
.mril{font-size:10px;color:var(--text3)}
.mriv{font-size:13px;font-weight:600}
.spill{padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600;flex-shrink:0}

/* ─ 멤버 탭 ─ */
.mtrow{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.mtab{padding:6px 14px;border-radius:99px;border:0.5px solid var(--border);font-size:13px;cursor:pointer;background:var(--surface);font-family:inherit;color:var(--text2);transition:all .15s;font-weight:500}
.mtab.on{background:var(--orange);color:#fff;border-color:var(--orange-dark)}

/* ─ 아이콘 ─ */
.ipick{background:var(--surface2);border-radius:var(--radius-sm);padding:10px;margin-top:6px;border:0.5px solid var(--border)}
.igrid{display:flex;flex-wrap:wrap;gap:5px}
.io,.ao{font-size:18px;padding:6px;border-radius:7px;cursor:pointer;border:1.5px solid transparent;transition:all .12s}
.io:hover,.ao:hover{background:var(--surface);border-color:var(--border2)}
.io.sel,.ao.sel{border-color:var(--orange);background:var(--orange-bg)}
.ao{padding:6px 8px}
.apick{display:flex;flex-wrap:wrap;gap:5px;background:var(--surface2);border-radius:var(--radius-sm);padding:10px;margin-bottom:10px;border:0.5px solid var(--border)}

/* ─ 분류 ─ */
.nrec{text-align:center;padding:2.5rem;color:var(--text3);font-size:14px}
.empty-state{display:flex;flex-direction:column;align-items:center;padding:3rem 1rem;gap:10px;text-align:center}
.empty-state .es-icon{font-size:52px;opacity:.35;line-height:1}
.empty-state .es-title{font-size:15px;font-weight:600;color:var(--text2)}
.empty-state .es-sub{font-size:13px;color:var(--text3);line-height:1.6;max-width:240px}
.tip{font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.5}
.ne{font-size:15px;font-weight:600;background:none;border:none;border-bottom:1.5px solid var(--border);outline:none;color:var(--text);width:130px;font-family:inherit;padding-bottom:2px}
.ne:focus{border-bottom-color:var(--orange)}
.cni{font-size:14px;background:none;border:none;border-bottom:1.5px solid var(--border);width:110px;outline:none;padding:0 2px 2px;font-family:inherit;color:var(--text);font-weight:500}
.cni:focus{border-bottom-color:var(--orange)}
.cat-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:7px;box-shadow:var(--shadow)}
.cat-item.dragging{opacity:.45}
.cat-item.drag-over{border-color:var(--orange);background:var(--orange-bg)}
.drag-handle{color:var(--border2);cursor:grab;font-size:15px;padding:0 2px;user-select:none;flex-shrink:0}
.type-badge{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:600;flex-shrink:0;cursor:pointer;user-select:none;transition:all .15s}
.type-badge.fixed{background:var(--blue-bg);color:var(--blue-text)}
.type-badge.variable{background:var(--green-bg);color:var(--green-text)}
.type-badge.family{background:var(--purple);color:#fff}
.type-badge.personal{background:var(--surface2);color:var(--text2);border:0.5px solid var(--border)}
.sort-confirm-bar{background:var(--orange);color:#fff;border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px}
.family-bud-hint{font-size:11px;color:var(--purple);margin-top:3px;padding:3px 8px;background:var(--purple-bg);border-radius:var(--radius-sm)}

/* ─ 분할선 ─ */
.divider{border:none;border-top:0.5px solid var(--border);margin:1.5rem 0}

/* ─ 盈餘池 ─ */
.pool-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:10px;box-shadow:var(--shadow)}
.pool-balance{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin:4px 0 12px}
.pool-balance.pos{color:var(--green)}.pool-balance.neg{color:var(--red)}
.pool-tx-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:0.5px solid var(--border)}
.pool-tx-row:last-child{border-bottom:none}
.pool-tx-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pool-tx-in{background:var(--green)}.pool-tx-out{background:var(--red)}
.pool-tx-info{flex:1;min-width:0}
.pool-tx-note{font-size:13px;color:var(--text)}
.pool-tx-date{font-size:11px;color:var(--text3);margin-top:1px}
.pool-tx-amt{font-size:14px;font-weight:600;flex-shrink:0}
.pool-tx-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 6px}
.pool-tx-del:hover{color:var(--red)}
.pool-actions{display:flex;gap:8px;margin-top:10px}
.pool-tab-row{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.pool-tab{padding:5px 14px;border-radius:99px;border:0.5px solid var(--border);font-size:13px;cursor:pointer;background:var(--surface);font-family:inherit;color:var(--text2);transition:all .15s}
.pool-tab.on{background:var(--orange);color:#fff;border-color:var(--orange-dark)}

/* ─ 검색 ─ */
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap input{width:100%;font-size:14px;padding:9px 11px 9px 36px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit}
.search-wrap input:focus{outline:none;border-color:var(--orange)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;color:var(--text3)}

/* ─ 모달 ─ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:1.25rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom,0));width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);padding:4px;line-height:1}

/* ─ 快速記帳 ─ */
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.quick-btn{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 8px;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;position:relative;box-shadow:var(--shadow)}
.quick-btn:hover{background:var(--orange-bg);border-color:var(--orange)}
.quick-btn .qb-icon{font-size:20px;display:block;margin-bottom:4px}
.quick-btn .qb-name{font-size:12px;color:var(--text2);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.quick-btn .qb-amt{font-size:13px;font-weight:700;color:var(--red);display:block}
.quick-btn .qb-del{position:absolute;top:3px;right:3px;background:var(--surface2);border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:2px 4px;line-height:1;display:none;border-radius:4px}
.quick-btn:hover .qb-del{display:block}
.add-quick-btn{background:var(--surface2);border:1px dashed var(--border2);border-radius:var(--radius);padding:10px 8px;cursor:pointer;font-family:inherit;text-align:center;color:var(--text3);font-size:13px;transition:all .15s}
.add-quick-btn:hover{border-color:var(--orange);color:var(--orange)}

/* ─ 금액버튼 ─ */
.amt-quick{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.amt-q-btn{padding:5px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--surface2);font-size:12px;cursor:pointer;font-family:inherit;color:var(--text2);transition:all .15s}
.amt-q-btn:hover{background:var(--orange-bg);color:var(--orange);border-color:var(--orange)}
.amt-q-btn.neg{color:var(--red);border-color:#f0b0a0}

/* ─ 수입힌트 ─ */
.income-hint{font-size:12px;color:var(--blue);background:var(--blue-bg);border-radius:var(--radius-sm);padding:7px 10px;margin-bottom:8px;display:none}
.income-hint.show{display:block}

/* ─ 기록후바 ─ */
.after-record-bar{background:var(--green-bg);border:0.5px solid #80d4b0;border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:10px;display:none;align-items:center;justify-content:space-between;gap:8px}
.after-record-bar.show{display:flex}

/* ─ 注意사항 ─ */
.days-hint{font-size:11px;color:var(--text3);margin-top:3px}
.days-hint.warn{color:var(--amber)}.days-hint.danger{color:var(--red)}
.trend-up{color:var(--red);font-size:11px;margin-left:3px}
.trend-down{color:var(--green);font-size:11px;margin-left:3px}
.trend-flat{color:var(--text3);font-size:11px;margin-left:3px}

/* ─ 테마 ─ */
.theme-toggle{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow)}
.ts-switch{position:relative;width:44px;height:26px;cursor:pointer;flex-shrink:0}
.ts-switch input{opacity:0;width:0;height:0;position:absolute}
.ts-slider{position:absolute;inset:0;background:var(--border2);border-radius:99px;transition:.25s}
.ts-slider:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.ts-switch input:checked+.ts-slider{background:var(--orange)}
.ts-switch input:checked+.ts-slider:before{transform:translateX(18px)}

/* ─ 노트힌트 ─ */
.note-sugs{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.note-sug{padding:3px 10px;border-radius:99px;border:0.5px solid var(--border);background:var(--surface2);font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit}
.note-sug:hover{background:var(--orange-bg);color:var(--orange)}

/* ─ 자동记 ─ */
.auto-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:7px;box-shadow:var(--shadow)}
.auto-badge{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--orange-bg);color:var(--orange-text);flex-shrink:0;white-space:nowrap}

/* ─ 파이차트 ─ */
.pie-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:1.5rem}
.pie-row{display:flex;align-items:center;gap:10px}
.pie-bar-track{flex:1;background:var(--surface2);border-radius:99px;height:8px;overflow:hidden}
.pie-bar-fill{height:8px;border-radius:99px}
.pie-label{font-size:12px;color:var(--text);min-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pie-amt{font-size:12px;color:var(--text2);min-width:70px;text-align:right;flex-shrink:0}
.pie-pct{font-size:11px;color:var(--text3);min-width:34px;text-align:right;flex-shrink:0}
.export-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit;box-shadow:var(--shadow)}
.export-btn:hover{background:var(--surface2)}

/* ─ 뷰토글 ─ */
.view-toggle{display:flex;background:var(--surface2);border-radius:99px;padding:3px;margin-bottom:1rem;width:fit-content}
.view-toggle-btn{padding:6px 18px;border-radius:99px;border:none;background:none;font-size:13px;cursor:pointer;font-family:inherit;color:var(--text2);transition:all .2s}
.view-toggle-btn.on{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.family-cat-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow)}
.member-exp-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:6px}

/* ─ 애니메이션 ─ */
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.rrow:active{background:var(--surface2)}
.pb{transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ─ 반응형 ─ */
@media(max-width:500px){.fr.t3{grid-template-columns:1fr 1fr}}

/* ─ 요약카드 ─ */
.summary-card{border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;background:linear-gradient(135deg,#ffb347 0%,#f5a623 45%,#ff8c69 100%);color:#fff;box-shadow:0 6px 20px rgba(245,166,35,.3)}
.summary-card .sc-title{font-size:12px;opacity:.8;margin-bottom:.5rem}
.summary-card .sc-surplus{font-size:32px;font-weight:700;letter-spacing:-1px;margin-bottom:.75rem}
.summary-card .sc-row{display:flex;gap:16px;font-size:12px;opacity:.85;flex-wrap:wrap}
.summary-card .sc-vs{font-size:12px;opacity:.75;margin-top:.5rem}
.ovr-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;background:rgba(255,255,255,.25);color:#fff;margin-right:4px;margin-bottom:4px}
</style>
</head>
<body>
<div id="lo"><div class="spin"></div><span>連線中...</span></div>

<nav class="bottom-nav" id="bottomNav">
  <button class="bnav-btn" onclick="goTab('ov')" id="nb_ov">
    <div class="bnav-icon-wrap">📊</div>
    <span>總覽</span>
  </button>
  <button class="bnav-btn" onclick="goTab('bud')" id="nb_bud">
    <div class="bnav-icon-wrap">🎯</div>
    <span>預算</span>
  </button>
  <button class="bnav-fab" onclick="goTab('add')" id="nb_add">
    <div class="bnav-fab-circle">➕</div>
    <span class="bnav-fab-label">記帳</span>
  </button>
  <button class="bnav-btn" onclick="goTab('rec')" id="nb_rec">
    <div class="bnav-icon-wrap">📋</div>
    <span>明細</span>
  </button>
  <button class="bnav-btn" onclick="goTab('mem')" id="nb_mem">
    <div class="bnav-icon-wrap">⚙️</div>
    <span>設定</span>
  </button>
</nav>

<div class="wrap">
<div class="header">
  <div class="header-inner">
    <div class="app-title">家庭<em>理財</em><span class="sdot" id="sd"></span></div>
    <div class="mnav">
      <button onclick="chMonth(-1)">‹</button>
      <span class="mlbl" id="ml"></span>
      <button onclick="chMonth(1)">›</button>
    </div>
  </div>
</div>

<div id="tov"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><button class="btn" onclick="goTab('yr')" style="font-size:12px;padding:5px 12px;color:var(--text2)">📈 年度走勢</button><button class="btn" onclick="goTab('pool')" style="font-size:12px;padding:5px 12px;color:var(--text2)">🏦 盈餘池</button></div><div id="ov_summary"></div><div id="ov_alert"></div><div id="ov_body"></div></div>
<div id="modal_root"></div>

<div id="tyr" style="display:none">
  <div class="mtrow" id="yr_mtabs"></div>
  <div class="sh" id="yr_title"></div>
  <div class="ygrid" id="yr_totals"></div>
  <div class="sh">每月盈餘走勢</div>
  <div id="yr_chart" style="margin-bottom:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 4px;box-shadow:var(--shadow)"></div>
  <div style="margin-bottom:1.25rem"></div>
  <div class="sh">支出分類統計</div>
  <div id="yr_cat_chart" class="pie-wrap"></div>
  <div class="sh">逐月明細</div>
  <div id="yr_rows"></div>
</div>

<div id="tbud" style="display:none">
  <div class="mtrow" id="bud_mtabs"></div>
  <div id="bud_alert"></div>
  <div id="bud_bar"></div>
  <div id="bud_body"></div>
</div>

<div id="tadd" style="display:none">
  <div class="sh" style="margin-bottom:8px">快速記帳</div>
  <div id="quick_grid" class="quick-grid"></div>
  <hr class="divider" style="margin:.75rem 0 1rem">
  <div class="sh" style="margin-bottom:10px">手動記帳</div>
  <div class="card">
    <div class="fr" style="margin-bottom:8px">
      <div class="fg"><label>類型</label>
        <select id="aType" onchange="refreshCatSelWithHint()"><option value="expense">支出</option><option value="income">收入</option></select>
      </div>
      <div class="fg"><label>成員</label><select id="aPerson"></select></div>
    </div>
    <div id="income_hint" class="income-hint">💡 請確認日期為實際入帳當月，系統會依此月份計算收支。</div>
    <div class="fg" style="margin-bottom:8px">
      <label>金額（NT$）</label>
      <input type="tel" id="aAmt" placeholder="0 或輸入算式如 120+85" inputmode="decimal" pattern="[0-9+\-*/.]*" oninput="previewCalc()">
      <div id="calcPreview" style="font-size:12px;color:var(--blue);margin-top:4px;display:none"></div>
      <div class="amt-quick">
        <button type="button" class="amt-q-btn" onclick="addAmt(100)">+100</button>
        <button type="button" class="amt-q-btn" onclick="addAmt(500)">+500</button>
        <button type="button" class="amt-q-btn" onclick="addAmt(1000)">+1000</button>
        <button type="button" class="amt-q-btn" onclick="addAmt(5000)">+5000</button>
        <button type="button" class="amt-q-btn neg" onclick="document.getElementById('aAmt').value=''">清除</button>
      </div>
    </div>
    <div class="fr" style="margin-bottom:8px">
      <div class="fg"><label id="aCatLbl">分類</label><select id="aCat" onchange="autoFillFamilyShare()"></select></div>
    </div>
    <div class="fr" style="margin-bottom:8px">
      <div class="fg"><label>日期</label><input type="date" id="aDate"></div>
      <div class="fg"><label>時間</label><input type="time" id="aTime" style="font-size:13px;padding:9px 11px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit"></div>
    </div>
    <div class="fr" style="grid-template-columns:1fr">
      <div class="fg"><label>備註（選填）</label><input type="text" id="aNote" placeholder="說明..." oninput="showNoteSugs()" onfocus="showNoteSugs()"><div class="note-sugs" id="noteSugs"></div></div>
    </div>
    <div class="fr" style="grid-template-columns:1fr 1fr;margin-bottom:4px">
      <div class="fg"><label>分期標註（選填）</label><input type="text" id="aInstall" placeholder="如 1/6、3/12"></div>
      <div class="fg" style="justify-content:flex-end;padding-top:20px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text2)">
          <input type="checkbox" id="aSaveQuick" style="width:14px;height:14px"> 加入常用
        </label>
      </div>
    </div>
    <div class="after-record-bar" id="afterRecordBar">
      <span style="font-size:13px;color:var(--green-text)">✓ 記帳成功！</span>
      <div style="display:flex;gap:8px">
        <button class="btn sm" onclick="continueRecord()">繼續記帳</button>
        <button class="btn sm pri" onclick="goTab('ov')">查看總覽</button>
      </div>
    </div>
    <button class="btn pri" onclick="addRecord()" style="width:100%;margin-top:4px" id="addRecordBtn">＋ 新增記帳</button>
  </div>
</div>

<div id="trec" style="display:none">
  <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" id="recSearch" placeholder="搜尋備註、分類..." oninput="renderRec()"></div>
  <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center">
    <select id="fPerson" onchange="renderRec()" style="font-size:13px;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-family:inherit;color:var(--text)"></select>
    <select id="fType"   onchange="renderRec()" style="font-size:13px;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-family:inherit;color:var(--text)">
      <option value="all">收入＋支出</option><option value="income">收入</option><option value="expense">支出</option>
    </select>
    <select id="fMonth" onchange="renderRec()" style="font-size:13px;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-family:inherit;color:var(--text)">
      <option value="current">本月</option>
      <option value="all">全部月份</option>
    </select>
    <select id="fSort" onchange="renderRec()" style="font-size:13px;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-family:inherit;color:var(--text)">
      <option value="date_desc">日期（新→舊）</option>
      <option value="date_asc">日期（舊→新）</option>
      <option value="amount_desc">金額（高→低）</option>
      <option value="amount_asc">金額（低→高）</option>
      <option value="cat_asc">分類排序</option>
    </select>
    <button class="export-btn" onclick="exportExcel()">📥 匯出</button>
  </div>
  <div id="rec_count" style="font-size:12px;color:var(--text3);margin-bottom:8px"></div>
  <div id="rec_list"></div>
</div>

<div id="tmem" style="display:none">
  <div class="theme-toggle">
    <span style="font-size:14px;color:var(--text)">🌙 深色模式</span>
    <label class="ts-switch">
      <input type="checkbox" id="darkToggle" onchange="setTheme(this.checked?'dark':'light')">
      <span class="ts-slider"></span>
    </label>
  </div>
  <div class="sh">成員</div>
  <div class="tip" style="margin-top:-4px">點頭像換圖示，名稱可直接編輯</div>
  <div id="mem_cards"></div>
  <hr class="divider">
  <div id="cat_sort_bar"></div>
  <div class="sh">支出分類管理</div>
  <div class="tip">拖曳 ☰ 調整順序，點標籤切換固定／不固定，點「🏠家庭/👤個人」切換預算模式，💡 切換天數提示，完成後點「確定」儲存。</div>
  <div id="cat_list"></div>
  <div style="display:flex;gap:8px;margin-top:8px">
    <button class="btn" onclick="addCat('fixed')">＋ 固定支出</button>
    <button class="btn" onclick="addCat('variable')">＋ 不固定支出</button>
  </div>
  <hr class="divider">
  <div class="sh">固定支出自動記帳</div>
  <div class="tip">每月開啟 App 時自動提示記帳，省去重複手動填。</div>
  <div id="auto_rec_list"></div>
  <button class="btn" onclick="openAutoRecModal()" style="margin-top:6px">＋ 新增自動項目</button>
</div>

<div id="tpool" style="display:none">
  <div class="pool-tab-row" id="pool_tabs"></div>
  <div id="pool_body"></div>
</div>

</div>
<script>
const INCOME_CATS=['薪資','獎金','投資收益','副業','租金','其他'];
const AVOPT=['🐱','🐶','🐼','🦊','🐨','🐸','🦁','🐯','🐻','🐹','🦋','🌸','🌟','🍀','🌈','🎀','🎸','🚀','🍓','🍩'];
const CICONS=['💳','🍱','🏠','🚗','🛡️','💡','📡','🛒','💊','📚','🎮','✈️','🎁','🐾','🧴','💰','🍺','👗','🏋️','💻'];
const MZH=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const MCOLS=['#7F77DD','#0f8a5f','#c94a20','#a06010','#1557a0','#b04070'];

window.activeTab='ov'; let curMonth=new Date(), activeTab='ov', budMember=null, yrMember='all';
let catDraft=null, ovView='personal'; // ovView: 'personal' | 'family'

function fmt(n){return 'NT$'+Math.round(n).toLocaleString();}
function fmtS(n){const a=Math.abs(Math.round(n));return(n<0?'-':'')+(a>=10000?(a/10000).toFixed(1)+'萬':a.toLocaleString());}
function ymKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function prevYmKey(){const p=new Date(curMonth.getFullYear(),curMonth.getMonth()-1,1);return ymKey(p);}
function sortedCats(arr){return [...arr].sort((a,b)=>(a.order??99)-(b.order??99));}
function fixedCats(arr){return sortedCats(arr).filter(c=>c.type==='fixed');}
function varCats(arr){return sortedCats(arr).filter(c=>c.type==='variable');}

function getBudget(ym,cid,mid){
  const mb=window.monthBudgets[ym];
  return mb&&mb[cid]&&mb[cid][mid]!=null?mb[cid][mid]:0;
}
function getFamilyBudget(ym,cid){
  // 家庭模式：取所有成員預算加總（或直接用 family 欄位）
  const mb=window.monthBudgets[ym];
  if(!mb||!mb[cid]) return 0;
  // 支援舊格式（各成員加總）和新格式（family key）
  if(mb[cid]['family']!=null) return mb[cid]['family'];
  return window.members.reduce((s,m)=>s+(mb[cid][m.id]||0),0);
}
function saveFamilyBudget(ym,cid,val){
  if(!window.monthBudgets[ym]) ensureMonthBudget(ym);
  if(!window.monthBudgets[ym][cid]) window.monthBudgets[ym][cid]={};
  window.monthBudgets[ym][cid]['family']=val;
  window.fbSaveMonthBudget(ym,window.monthBudgets[ym]);
}
function getCatMode(c){return c.budMode==='family'?'family':'personal';}
function getMemberMonthBudget(ym,mid){
  const memberCount=Math.max(window.members.length,1);
  return window.cats.reduce((s,c)=>{
    if(getCatMode(c)==='family'){
      // 家庭預算平均分攤到每個人
      return s+Math.round(getFamilyBudget(ym,c.id)/memberCount);
    }
    return s+getBudget(ym,c.id,mid);
  },0);
}
function getMemberFamilyShare(ym,mid){
  // 只算家庭預算分攤部分
  const memberCount=Math.max(window.members.length,1);
  return window.cats.reduce((s,c)=>{
    if(getCatMode(c)==='family') return s+Math.round(getFamilyBudget(ym,c.id)/memberCount);
    return s;
  },0);
}
function ensureMonthBudget(ym){
  if(window.monthBudgets[ym]) return window.monthBudgets[ym];
  const prev=prevYmKey(), prevData=window.monthBudgets[prev];
  const blank={};
  window.cats.forEach(c=>{blank[c.id]={};window.members.forEach(m=>{blank[c.id][m.id]=0;});});
  if(prevData){
    window.cats.forEach(c=>{
      window.members.forEach(m=>{
        blank[c.id][m.id]=(prevData[c.id]&&prevData[c.id][m.id]!=null)?prevData[c.id][m.id]:0;
      });
    });
  }
  window.monthBudgets[ym]=blank;
  window.fbSaveMonthBudget(ym,blank);
  return blank;
}

function getRecsYM(y,m){return window.records.filter(r=>{const d=new Date(r.date);return d.getFullYear()===y&&d.getMonth()===m;});}
function getMonthRecs(pf){const y=curMonth.getFullYear(),m=curMonth.getMonth();return getRecsYM(y,m).filter(r=>!pf||pf==='all'||r.person===pf||(pf!=='family'&&r.person==='family'));}
function mIncome(mid){return getMonthRecs(mid).filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);}

window.updateMonthLabel=function(){document.getElementById('ml').textContent=`${curMonth.getFullYear()} 年 ${curMonth.getMonth()+1} 月`;};
function chMonth(d){
  curMonth=new Date(curMonth.getFullYear(),curMonth.getMonth()+d,1);
  updateAll();
  if(activeTab==='add') renderAddForm();
}

function goTab(t){
  activeTab=t; window.activeTab=t;
  window.updateMonthLabel();
  try{ localStorage.setItem('lastTab', t); }catch(e){}
  ['ov','yr','bud','add','rec','mem','pool'].forEach(x=>{
    const el=document.getElementById('t'+x);if(el)el.style.display=t===x?'block':'none';
  });
  // nav 高亮（FAB 記帳獨立處理）
  ['ov','bud','rec','mem','pool'].forEach(x=>{
    const nb=document.getElementById('nb_'+x);
    if(nb){
      nb.classList.toggle('on',t===x);
      const wrap=nb.querySelector('.bnav-icon-wrap');
      if(wrap) wrap.style.background=t===x?'var(--orange-bg)':'';
    }
  });
  if(t==='ov'){renderSummaryCard();renderOverview();checkNewMonthBudget();checkAutoRecs();}
  else if(t==='yr') renderYearly();
  else if(t==='bud') renderBudget();
  else if(t==='add') renderAddForm();
  else if(t==='rec') renderRec();
  else if(t==='mem'){catDraft=null;renderMembers();}
  else if(t==='pool') renderPool();
}

/* ══ 月份摘要卡 ══ */
function renderSummaryCard(){
  if(!window.members.length) return;
  const ym=ymKey(curMonth);
  const allRecs=getMonthRecs('all');
  const inc=allRecs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const exp=allRecs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  const sur=inc-exp;
  const prevD=new Date(curMonth.getFullYear(),curMonth.getMonth()-1,1);
  const prevRecs=getRecsYM(prevD.getFullYear(),prevD.getMonth());
  const prevSur=prevRecs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0)
               -prevRecs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  const diff=sur-prevSur;
  const catSpent={};
  allRecs.filter(r=>r.type==='expense').forEach(r=>{catSpent[r.category]=(catSpent[r.category]||0)+r.amount;});
  const overCats=window.cats.filter(c=>{
    const bgt=window.members.reduce((s,m)=>s+getBudget(ym,c.id,m.id),0);
    return bgt>0&&(catSpent[c.name]||0)>bgt;
  });
  const el=document.getElementById('ov_summary');
  if(!el) return;

  // 圓環圖 SVG
  const R=38, CX=44, CY=44, CIRC=2*Math.PI*R;
  const expPct = inc>0 ? Math.min(exp/inc,1) : 0;
  const surPct = inc>0 ? Math.max((inc-exp)/inc,0) : 0;
  const expDash = expPct*CIRC;
  const surDash = surPct*CIRC;
  const GAP=2;
  const surColor=sur>=0?'var(--green)':'var(--red)';
  const surLabel=sur>=0?`+${fmt(sur)}`:fmt(sur);
  const ringHTML=`<svg width="88" height="88" viewBox="0 0 88 88" style="flex-shrink:0">
    <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="var(--surface2)" stroke-width="10"/>
    ${inc>0?`
    <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="var(--red)" stroke-width="10"
      stroke-dasharray="${expDash-GAP} ${CIRC-(expDash-GAP)}"
      stroke-dashoffset="${CIRC*0.25}" stroke-linecap="round" transform="rotate(0 ${CX} ${CY})"/>
    <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="var(--green)" stroke-width="10"
      stroke-dasharray="${Math.max(surDash-GAP,0)} ${CIRC-Math.max(surDash-GAP,0)}"
      stroke-dashoffset="${CIRC*0.25-expDash}" stroke-linecap="round"/>
    `:''}
    <text x="${CX}" y="${CY-5}" text-anchor="middle" font-size="9" fill="var(--text3)">${curMonth.getMonth()+1}月</text>
    <text x="${CX}" y="${CY+7}" text-anchor="middle" font-size="10" font-weight="500" fill="${surColor}">${sur>=0?'盈':'虧'}</text>
  </svg>`;

  const diffHTML=prevSur!==0
    ?`<div class="ring-vs">與上月 ${diff>=0?'↑':'↓'} ${fmt(Math.abs(diff))}</div>`:'' ;
  const overHTML=overCats.length
    ?`<div style="margin-top:6px">${overCats.map(c=>`<span class="ovr-badge">${c.icon} ${c.name}</span>`).join('')}</div>`:'';

  el.innerHTML=`<div class="ring-summary">
    ${ringHTML}
    <div class="ring-info">
      <div style="font-size:11px;color:var(--text3)">${curMonth.getFullYear()}年${curMonth.getMonth()+1}月 盈餘</div>
      <div class="ring-surplus animate-count" style="color:${surColor}">${surLabel}</div>
      <div class="ring-row">
        <span>↑ ${fmt(inc)}</span>
        <span>↓ ${fmt(exp)}</span>
      </div>
      <div style="display:flex;gap:10px">
        <span class="ring-legend"><span class="ring-dot" style="background:var(--green)"></span>收入</span>
        <span class="ring-legend"><span class="ring-dot" style="background:var(--red)"></span>支出</span>
      </div>
      ${diffHTML}${overHTML}
    </div>
  </div>`;
}
window.renderSummaryCard=renderSummaryCard;

window.renderOverview=function(){
  if(!window.members.length||!window.cats.length) return; // 等資料載入
  const ym=ymKey(curMonth);
  ensureMonthBudget(ym);
  const allRecs=getMonthRecs('all');
  const totalInc=allRecs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const totalExp=allRecs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  const totalSur=totalInc-totalExp;
  const totalBud=window.members.reduce((s,m)=>s+getMemberMonthBudget(ym,m.id),0);

  /* 預算超支警示 */
  const overMems=window.members.filter(m=>{const inc=mIncome(m.id),bud=getMemberMonthBudget(ym,m.id);return inc>0&&bud>inc;});
  document.getElementById('ov_alert').innerHTML=overMems.length
    ?`<div class="al alw"><span class="ali">⚠️</span><div>${overMems.map(m=>`${m.avatar} ${m.name} 預算超出收入 ${fmt(getMemberMonthBudget(ym,m.id)-mIncome(m.id))}`).join('、')}</div></div>`:'';

  /* 切換按鈕 */
  const toggleHTML=`<div class="view-toggle">
    <button class="view-toggle-btn ${ovView==='personal'?'on':''}" onclick="setOvView('personal')">👤 個人</button>
    <button class="view-toggle-btn ${ovView==='family'?'on':''}" onclick="setOvView('family')">🏠 家庭</button>
  </div>`;

  if(ovView==='personal'){
    /* ── 個人視角：各成員獨立卡片含明細 ── */
    const memberHTML=window.members.map((m,mi)=>{
      const recs=getMonthRecs(m.id);
      const inc=recs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
      const exp=recs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
      const bud=getMemberMonthBudget(ym,m.id), sur=inc-exp;
      const familyShareAmt=getMemberFamilyShare(ym,m.id);
      const color=MCOLS[mi%MCOLS.length];
      const catSpent={};
      recs.filter(r=>r.type==='expense').forEach(r=>{catSpent[r.category]=(catSpent[r.category]||0)+r.amount;});

      const renderGroup=(groupCats,groupLabel,badgeCls)=>{
        const active=groupCats.filter(c=>getBudget(ym,c.id,m.id)>0||catSpent[c.name]);
        if(!active.length) return '';
        const cards=active.map(c=>{
          const isFamily=getCatMode(c)==='family';
          const spent=isFamily
            ? getMonthRecs('all').filter(r=>r.type==='expense'&&r.category===c.name).reduce((s,r)=>s+r.amount,0)
            : (catSpent[c.name]||0);
          const bgt=isFamily?getFamilyBudget(ym,c.id):getBudget(ym,c.id,m.id);
          const pct=bgt>0?Math.min(spent/bgt*100,100):0;
          const over=bgt>0&&spent>bgt;
          const atLimit=bgt>0&&spent===bgt;
          const bc=over?'var(--red)':pct>80?'var(--amber)':color;
          const remainTxt=bgt>0?(over?`<span style="color:var(--red)">超 ${fmt(Math.abs(bgt-spent))}</span>`
            :(atLimit?`<span style="color:var(--amber)">已達上限</span>`
            :`<span style="color:var(--text3)">餘 ${fmt(bgt-spent)}</span>`))
            :`<span style="color:var(--text3)">未設預算</span>`;
          const hintTxt=daysHintHTML(spent,bgt,c.id);
          return `<div class="cat-big-card${over?' over':''}">
            <span class="cat-big-icon">${c.icon}</span>
            <div class="cat-big-name">${c.name}${trendHTML(spent,c.name)}</div>
            <div class="cat-big-amt">${fmt(spent)}</div>
            <div class="cat-big-bar"><div class="cat-big-fill" style="width:${pct}%;background:${bc}"></div></div>
            <div class="cat-big-remain">${remainTxt}</div>
            ${hintTxt}
          </div>`;
        }).join('');
        return `<div style="margin-bottom:14px">
          <div style="margin-bottom:8px"><span class="badge ${badgeCls}">${groupLabel}</span></div>
          <div class="cat-grid">${cards}</div>
        </div>`;
      };

      const budPct=bud>0&&inc>0?Math.min(exp/bud*100,100):0;
      const budColor=bud>inc&&inc>0?'var(--red)':budPct>85?'var(--amber)':color;
      const fixedHTML=renderGroup(fixedCats(window.cats),'固定支出','badge-fixed');
      const varHTML=renderGroup(varCats(window.cats),'不固定支出','badge-var');
      const hasAny=fixedHTML||varHTML;

      return `<div class="card card-accent" style="border-left-color:${color}">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
          <div style="width:44px;height:44px;border-radius:50%;background:${color}22;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${m.avatar}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:500;margin-bottom:5px;color:var(--text)">${m.name}</div>
            <div style="display:flex;gap:14px;font-size:12px;flex-wrap:wrap">
              <span style="color:var(--green)">收入 ${fmt(inc)}</span>
              <span style="color:var(--red)">支出 ${fmt(exp)}</span>
              <span style="color:${sur>=0?'var(--green)':'var(--red)'};font-weight:500">${sur>=0?'盈餘':'虧損'} ${fmt(Math.abs(sur))}</span>
            </div>
          </div>
        </div>
        ${bud>0?`<div style="margin-bottom:14px;padding:10px 12px;background:var(--surface2);border-radius:8px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <span style="font-size:11px;color:var(--text2)">預算 ${fmt(exp)} / ${fmt(bud)}${familyShareAmt>0?` <span style="color:var(--purple)">（含家庭分攤 ${fmt(familyShareAmt)}）</span>`:''}</span>
            <span style="font-size:11px;font-weight:500;color:${budColor}">${Math.round(exp/(bud||1)*100)}%</span>
          </div>
          <div class="pw"><div class="pb" style="width:${budPct}%;background:${budColor}"></div></div>
        </div>`:''}
        ${hasAny?fixedHTML+varHTML:`<div style="font-size:12px;color:var(--text3);text-align:center;padding:8px 0">本月無支出記錄</div>`}
      </div>`;
    }).join('');

    document.getElementById('ov_body').innerHTML=toggleHTML+memberHTML;

  } else {
    /* ── 家庭視角：分類合計進度 + 成員總額 ── */

    /* 全家摘要數字 */
    const budPct=totalBud>0?Math.min(totalExp/totalBud*100,100):0;
    const budColor=totalExp>totalBud&&totalBud>0?'var(--red)':budPct>85?'var(--amber)':'var(--green)';

    const summaryHTML=`
      <div class="sgrid" style="margin-bottom:1rem">
        <div class="met"><div class="ml">家庭總收入</div><div class="mv g">${fmt(totalInc)}</div></div>
        <div class="met"><div class="ml">家庭總支出</div><div class="mv r">${fmt(totalExp)}</div></div>
        <div class="met"><div class="ml">預算總額</div><div class="mv b">${fmt(totalBud)}</div></div>
        <div class="met"><div class="ml">${totalSur>=0?'家庭盈餘':'家庭虧損'}</div><div class="mv ${totalSur>=0?'g':'r'}">${fmt(Math.abs(totalSur))}</div></div>
      </div>
      <div style="padding:12px 14px;background:var(--surface2);border-radius:var(--radius);margin-bottom:1.25rem">
        <div style="display:flex;justify-content:space-between;margin-bottom:7px">
          <span style="font-size:12px;color:var(--text2)">預算整體使用進度</span>
          <span style="font-size:13px;font-weight:500;color:${budColor}">${fmt(totalExp)} / ${fmt(totalBud)} (${totalBud>0?Math.round(totalExp/totalBud*100):0}%)</span>
        </div>
        <div class="btrack"><div class="bfill" style="width:${budPct}%;background:${budColor}"></div></div>
      </div>`;

    /* 各分類合計 */
    const allCatSpent={};
    allRecs.filter(r=>r.type==='expense').forEach(r=>{allCatSpent[r.category]=(allCatSpent[r.category]||0)+r.amount;});

    const renderFamilyGroup=(groupCats,groupLabel,badgeCls)=>{
      const active=groupCats.filter(c=>{
        const totalBgtCat=window.members.reduce((s,m)=>s+getBudget(ym,c.id,m.id),0);
        return totalBgtCat>0||(allCatSpent[c.name]||0)>0;
      });
      if(!active.length) return '';
      const rows=active.map(c=>{
        const spent=allCatSpent[c.name]||0;
        const bgt=window.members.reduce((s,m)=>s+getBudget(ym,c.id,m.id),0);
        const pct=bgt>0?Math.min(spent/bgt*100,100):0;
        const over=bgt>0&&spent>bgt;
        const bc=over?'var(--red)':pct>80?'var(--amber)':'var(--blue)';
        return `<div class="family-cat-row">
          <span style="font-size:20px;width:26px;text-align:center;flex-shrink:0">${c.icon}</span>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
              <span style="font-size:14px;color:var(--text)">${c.name}</span>
              <span style="font-size:12px;color:${over?'var(--red)':'var(--text2)'}">
                ${bgt>0?(over?'超支 '+fmt(Math.abs(bgt-spent)):'餘 '+fmt(bgt-spent)):''}
              </span>
            </div>
            <div class="pw" style="height:6px"><div class="pb" style="height:6px;width:${pct}%;background:${bc}"></div></div>
            <div style="display:flex;justify-content:space-between;margin-top:4px">
              <span style="font-size:11px;color:var(--text3)">支出 ${fmt(spent)}</span>
              ${bgt>0?`<span style="font-size:11px;color:var(--text3)">預算 ${fmt(bgt)}</span>`:'<span style="font-size:11px;color:var(--text3)">未設預算</span>'}
            </div>
          </div>
        </div>`;
      }).join('');
      return `<div style="margin-bottom:1.25rem">
        <div class="sh-row" style="margin-top:0"><span class="sh">${groupLabel}</span><span class="badge ${badgeCls}">${active.length} 項</span></div>
        ${rows}
      </div>`;
    };

    const fcHTML=renderFamilyGroup(fixedCats(window.cats),'固定支出','badge-fixed');
    const vcHTML=renderFamilyGroup(varCats(window.cats),'不固定支出','badge-var');

    /* 各成員支出總額（不含明細） */
    const memberSummary=`
      <hr class="divider">
      <div class="sh">成員支出總覽</div>
      ${window.members.map((m,mi)=>{
        const mExp=getMonthRecs(m.id).filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
        const mBud=getMemberMonthBudget(ym,m.id);
        const mPct=mBud>0?Math.min(mExp/mBud*100,100):0;
        const color=MCOLS[mi%MCOLS.length];
        const mColor=mExp>mBud&&mBud>0?'var(--red)':mPct>85?'var(--amber)':color;
        return `<div class="member-exp-row">
          <div style="width:36px;height:36px;border-radius:50%;background:${color}22;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${m.avatar}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
              <span style="font-size:13px;font-weight:500;color:var(--text)">${m.name}</span>
              <span style="font-size:13px;color:var(--red)">${fmt(mExp)}</span>
            </div>
            ${mBud>0?`<div class="pw" style="height:4px"><div class="pb" style="height:4px;width:${mPct}%;background:${mColor}"></div></div>
            <div style="font-size:10px;color:var(--text3);margin-top:3px">預算 ${fmt(mBud)} · 使用 ${Math.round(mExp/(mBud||1)*100)}%</div>`
            :'<div style="font-size:10px;color:var(--text3)">未設預算</div>'}
          </div>
        </div>`;
      }).join('')}`;

    document.getElementById('ov_body').innerHTML=toggleHTML+summaryHTML+fcHTML+vcHTML+memberSummary;
  }
};

window.setOvView=function(v){ovView=v;renderSummaryCard();renderOverview();};

function renderYearly(){
  document.getElementById('yr_mtabs').innerHTML=
    `<button class="mtab ${yrMember==='all'?'on':''}" onclick="setYrM('all')">全家</button>`
    +window.members.map(m=>`<button class="mtab ${yrMember===m.id?'on':''}" onclick="setYrM('${m.id}')">${m.avatar} ${m.name}</button>`).join('');
  const y=curMonth.getFullYear();
  document.getElementById('yr_title').textContent=`${y} 年度盈餘 — ${yrMember==='all'?'全家':(window.members.find(m=>m.id===yrMember)?.name||'')}`;
  const now=new Date(), maxM=y===now.getFullYear()?now.getMonth():11;
  const md=[];let yI=0,yE=0;
  for(let m=0;m<=maxM;m++){
    const mym=`${y}-${String(m+1).padStart(2,'0')}`;
    const recs=getRecsYM(y,m).filter(r=>yrMember==='all'||r.person===yrMember);
    const inc=recs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
    const exp=recs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
    const bud=yrMember==='all'?window.members.reduce((s,mem)=>s+getMemberMonthBudget(mym,mem.id),0):getMemberMonthBudget(mym,yrMember);
    md.push({m,inc,exp,sur:inc-exp,bud,budOver:bud>inc&&inc>0});
    yI+=inc;yE+=exp;
  }
  const yS=yI-yE;
  document.getElementById('yr_totals').innerHTML=`
    <div class="ym"><div class="yml">年度總收入</div><div class="ymv" style="color:var(--green)">${fmt(yI)}</div></div>
    <div class="ym"><div class="yml">年度總支出</div><div class="ymv" style="color:var(--red)">${fmt(yE)}</div></div>
    <div class="ym"><div class="yml">累計盈餘</div><div class="ymv" style="color:${yS>=0?'var(--green)':'var(--red)'}">${fmt(yS)}</div></div>
    <div class="ym"><div class="yml">平均每月</div><div class="ymv" style="color:${yS>=0?'var(--green)':'var(--red)'}">${md.length?fmt(Math.round(yS/md.length)):fmt(0)}</div></div>`;
  // ── SVG 曲線圖 ──
  const W=600, H=140, PAD={t:28,r:16,b:28,l:48};
  const iW=W-PAD.l-PAD.r, iH=H-PAD.t-PAD.b;
  const vals=md.map(d=>d.sur);
  const minV=Math.min(...vals,0), maxV=Math.max(...vals,0);
  const range=maxV-minV||1;
  const xStep=md.length>1?iW/(md.length-1):iW;
  const toX=i=>PAD.l+(md.length>1?i*xStep:iW/2);
  const toY=v=>PAD.t+iH-(((v-minV)/range)*iH);
  const zeroY=toY(0);

  // 折線點
  const pts=md.map((d,i)=>({x:toX(i),y:toY(d.sur),sur:d.sur,m:d.m,budOver:d.budOver}));

  // path
  const linePath=pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(' ');
  // 填色區域
  const areaPath=pts.length
    ?`M${pts[0].x},${zeroY} `+pts.map(p=>`L${p.x},${p.y}`).join(' ')+` L${pts[pts.length-1].x},${zeroY} Z`
    :'';

  // Y 軸刻度（3條）
  const yTicks=[minV, (minV+maxV)/2, maxV].map(v=>({v,y:toY(v)}));

  const svgHTML=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;overflow:visible">
    <defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${minV<0?'#c94a20':'#0f8a5f'}" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="${minV<0?'#c94a20':'#0f8a5f'}" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <!-- 格線 -->
    ${yTicks.map(t=>`<line x1="${PAD.l}" y1="${t.y}" x2="${W-PAD.r}" y2="${t.y}" stroke="#e8e8e2" stroke-width="1"/>`).join('')}
    <!-- 零線 -->
    <line x1="${PAD.l}" y1="${zeroY}" x2="${W-PAD.r}" y2="${zeroY}" stroke="#d8d8d0" stroke-width="1.5" stroke-dasharray="4,3"/>
    <!-- Y 刻度 -->
    ${yTicks.map(t=>`<text x="${PAD.l-6}" y="${t.y+4}" text-anchor="end" font-size="10" fill="#a8a8aa">${fmtS(Math.round(t.v))}</text>`).join('')}
    <!-- X 標籤 -->
    ${pts.map(p=>`<text x="${p.x}" y="${H-4}" text-anchor="middle" font-size="10" fill="#a8a8aa">${MZH[p.m]}${p.budOver?'⚠':''}</text>`).join('')}
    <!-- 填色 -->
    ${areaPath?`<path d="${areaPath}" fill="url(#areaGrad)"/>`:''}
    <!-- 折線 -->
    <path d="${linePath}" fill="none" stroke="#0f8a5f" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- 資料點 -->
    ${pts.map(p=>{
      const c=p.sur>=0?'#0f8a5f':'#c94a20';
      const label=fmtS(p.sur);
      const labelY=p.sur>=0?p.y-10:p.y+16;
      return `<circle cx="${p.x}" cy="${p.y}" r="4" fill="${c}" stroke="#fff" stroke-width="2"/>
        <text x="${p.x}" y="${labelY}" text-anchor="middle" font-size="10" font-weight="500" fill="${c}">${label}</text>`;
    }).join('')}
  </svg>`;

  const chartEl=document.getElementById('yr_chart');
  chartEl.style.height='auto';
  chartEl.style.padding='8px 0';
  chartEl.innerHTML=svgHTML;
  renderCatChart(yrMember);
  document.getElementById('yr_rows').innerHTML=md.slice().reverse().map(d=>{
    const pc=d.sur>=0?'background:var(--green-bg);color:var(--green-text)':'background:var(--red-bg);color:var(--red-text)';
    return `<div class="mrow${d.budOver?' ob':''}">
      <div class="mrm">${MZH[d.m]}</div>
      <div class="mrd">
        <div class="mri"><span class="mril">收入</span><span class="mriv" style="color:var(--green)">${fmt(d.inc)}</span></div>
        <div class="mri"><span class="mril">支出</span><span class="mriv" style="color:var(--red)">${fmt(d.exp)}</span></div>
        <div class="mri"><span class="mril">預算</span><span class="mriv" style="color:${d.budOver?'var(--red)':'var(--blue)'}">${fmt(d.bud)}</span></div>
        <span class="spill" style="${pc}">${d.sur>=0?'盈餘':'虧損'} ${fmt(Math.abs(d.sur))}</span>
        ${d.budOver?`<span style="font-size:11px;padding:2px 7px;border-radius:var(--radius-pill);background:var(--amber-bg);color:var(--amber-text)">預算超收入</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderBudget(){
  if(!budMember&&window.members.length) budMember=window.members[0].id;
  const ym=ymKey(curMonth);
  ensureMonthBudget(ym);
  const inc=mIncome(budMember), bud=getMemberMonthBudget(ym,budMember);
  const familyShare=getMemberFamilyShare(ym,budMember);
  const personalBud=bud-familyShare;
  const over=inc>0&&bud>inc, pct=inc>0?Math.min(bud/inc*100,100):0;
  const fc=over?'#D85A30':pct>85?'#BA7517':'#1D9E75';
  const mem=window.members.find(m=>m.id===budMember);

  document.getElementById('bud_mtabs').innerHTML=window.members.map(m=>
    `<button class="mtab ${m.id===budMember?'on':''}" onclick="setBudM('${m.id}')">${m.avatar} ${m.name}</button>`).join('');

  document.getElementById('bud_alert').innerHTML=inc===0
    ?`<div class="al alw"><span class="ali">⚠️</span><div>${mem?.avatar} ${mem?.name} 本月尚無收入，無法驗證預算。</div></div>`
    :over
      ?`<div class="al alw"><span class="ali">⚠️</span><div>${mem?.avatar} ${mem?.name} 預算合計 <strong>${fmt(bud)}</strong> 超過收入 <strong>${fmt(inc)}</strong>，超出 <strong>${fmt(bud-inc)}</strong>。${familyShare>0?`（含家庭分攤 ${fmt(familyShare)}）`:''}</div></div>`
      :`<div class="al alo"><span class="ali">✅</span><div>${mem?.avatar} ${mem?.name} 預算合計 ${fmt(bud)}${familyShare>0?`（個人 ${fmt(personalBud)} + 家庭分攤 ${fmt(familyShare)}）`:''}，收入 ${fmt(inc)}，剩餘可分配 ${fmt(inc-bud)}。</div></div>`;

  document.getElementById('bud_bar').innerHTML=`<div class="btbar">
    <div class="btr"><span class="btl">預算佔收入比（${curMonth.getFullYear()}年${curMonth.getMonth()+1}月）</span>
      <span class="btv" style="color:${fc}">${fmt(bud)} / ${inc>0?fmt(inc):'未登錄'} ${inc>0?'('+Math.round(pct)+'%)':''}</span>
    </div>
    <div class="btrack"><div class="bfill" style="width:${pct}%;background:${fc}"></div></div>
  </div>`;

  const renderBudGroup=(groupCats,label,badgeCls)=>{
    if(!groupCats.length) return '';
    const rows=groupCats.map(c=>{
      const isFamily=getCatMode(c)==='family';
      const val=isFamily?getFamilyBudget(ym,c.id):getBudget(ym,c.id,budMember);
      const totalSpent=isFamily
        ?getMonthRecs('all').filter(r=>r.type==='expense'&&r.category===c.name).reduce((s,r)=>s+r.amount,0)
        :null;
      const memberCount=Math.max(window.members.length,1);
      const perPersonAmt=isFamily&&val>0?Math.round(val/memberCount):0;
      const ratio=inc>0&&val>0?Math.round(val/inc*100):0;
      const famPct=isFamily&&val>0?Math.min((totalSpent||0)/val*100,100):0;
      const famColor=famPct>=100?'var(--red)':famPct>80?'var(--amber)':'var(--purple)';
      return `<div class="card" style="${val===0?'opacity:0.55':''}">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:20px;width:26px;text-align:center;flex-shrink:0">${c.icon}</span>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
              <span style="font-size:14px;color:var(--text)">${c.name}</span>
              ${isFamily?'<span style="font-size:10px;padding:1px 7px;border-radius:99px;background:var(--purple);color:#fff">家庭共用</span>':''}
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span style="font-size:11px;color:var(--text2)">NT$</span>
              <input class="bi" type="number" value="${val}" min="0" id="bi_${c.id}"
                onchange="${isFamily?'updateFamilyBudget':'updateBudget'}('${c.id}',this.value)"
                ${isFamily?'':'oninput="checkBI(\''+c.id+'\',this.value)"'}>
              ${val===0?`<span style="font-size:11px;color:var(--text3)">${isFamily?'未設家庭預算':'本月不負責'}</span>`:''}
            </div>
            ${isFamily&&val>0?`
            <div style="margin-top:8px;padding:8px 10px;background:var(--surface2);border-radius:var(--radius-sm)">
              <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
                <span style="font-size:11px;color:var(--text2)">每人分攤 <strong style="color:var(--purple)">${fmt(perPersonAmt)}</strong> × ${memberCount}人</span>
                <span style="font-size:11px;color:${famColor}">已付 ${fmt(totalSpent||0)} / ${fmt(val)}</span>
              </div>
              <div class="pw"><div class="pb" style="width:${famPct}%;background:${famColor}"></div></div>
              ${(totalSpent||0)>0?`<div style="margin-top:5px;font-size:10px;color:var(--text3)">
                ${window.members.map(m=>{
                  const mSpent=getMonthRecs('all').filter(r=>r.type==='expense'&&r.category===c.name&&r.person===m.id).reduce((s,r)=>s+r.amount,0);
                  return mSpent>0?`${m.avatar} ${m.name} 已付 ${fmt(mSpent)}`:'';
                }).filter(Boolean).join('　')}
              </div>`:''}
            </div>`:''}
            ${!isFamily&&inc>0&&val>0?`<div style="font-size:11px;color:var(--text3);margin-top:3px">${ratio}% 收入</div>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div class="bud-section">
      <div class="sh-row"><span class="sh">${label}</span><span class="badge ${badgeCls}">${groupCats.length} 項</span></div>
      ${rows}
    </div>`;
  };

  document.getElementById('bud_body').innerHTML=
    renderBudGroup(fixedCats(window.cats),'固定支出','badge-fixed')+
    renderBudGroup(varCats(window.cats),'不固定支出','badge-var');
}
function setBudM(id){budMember=id;renderBudget();}

function checkBI(cid,val){
  const ym=ymKey(curMonth),inc=mIncome(budMember);if(!inc)return;
  const newVal=parseFloat(val)||0;
  const other=window.cats.reduce((s,c)=>c.id===cid?s:s+getBudget(ym,c.id,budMember),0);
  const total=other+newVal;
  const el=document.getElementById('bi_'+cid);
  if(el)el.className='bi'+(total>inc?' warn':'');
  const over=total>inc,pct=Math.min(total/inc*100,100),fc=over?'#D85A30':pct>85?'#BA7517':'#1D9E75';
  const mem=window.members.find(m=>m.id===budMember);
  document.getElementById('bud_alert').innerHTML=over
    ?`<div class="al alw"><span class="ali">⚠️</span><div>調整後 ${mem?.avatar} ${mem?.name} 預算將達 <strong>${fmt(total)}</strong>，超過收入 <strong>${fmt(inc)}</strong>，超出 <strong>${fmt(total-inc)}</strong>。</div></div>`
    :`<div class="al alo"><span class="ali">✅</span><div>調整後 ${mem?.avatar} ${mem?.name} 預算 ${fmt(total)}，剩餘可分配 ${fmt(inc-total)}。</div></div>`;
  document.getElementById('bud_bar').innerHTML=`<div class="btbar">
    <div class="btr"><span class="btl">預算佔收入比</span>
      <span class="btv" style="color:${fc}">${fmt(total)} / ${fmt(inc)} (${Math.round(total/inc*100)}%)</span>
    </div>
    <div class="btrack"><div class="bfill" style="width:${Math.min(total/inc*100,100)}%;background:${fc}"></div></div>
  </div>`;
}
function updateFamilyBudget(cid,val){
  const ym=ymKey(curMonth);
  const newVal=parseFloat(val)||0;
  saveFamilyBudget(ym,cid,newVal);
  showToast('家庭預算已更新');
}
window.updateFamilyBudget=updateFamilyBudget;

function updateBudget(cid,val){
  const ym=ymKey(curMonth),inc=mIncome(budMember);
  const newVal=parseFloat(val)||0;
  const other=window.cats.reduce((s,c)=>c.id===cid?s:s+getBudget(ym,c.id,budMember),0);
  if(inc>0&&other+newVal>inc){
    const max=Math.max(0,inc-other);
    if(!confirm(`預算總額將超過收入 ${fmt(inc)}。\n確定設定 ${fmt(newVal)} 嗎？（建議上限 ${fmt(max)}）`)){
      const el=document.getElementById('bi_'+cid);if(el)el.value=getBudget(ym,cid,budMember);
      renderBudget();return;
    }
  }
  if(!window.monthBudgets[ym]) ensureMonthBudget(ym);
  if(!window.monthBudgets[ym][cid]) window.monthBudgets[ym][cid]={};
  window.monthBudgets[ym][cid][budMember]=newVal;
  window.fbSaveMonthBudget(ym,window.monthBudgets[ym]);
  renderBudget();
}

function autoFillFamilyShare(){
  const catName=document.getElementById('aCat')?.value;
  const type=document.getElementById('aType')?.value;
  if(type!=='expense'||!catName) return;
  const cat=window.cats.find(c=>c.name===catName);
  if(!cat||getCatMode(cat)!=='family') return;
  const ym=ymKey(curMonth);
  const total=getFamilyBudget(ym,cat.id);
  if(!total) return;
  const share=Math.round(total/Math.max(window.members.length,1));
  const amtEl=document.getElementById('aAmt');
  // 只有金額是空的時候才自動帶入（不覆蓋已輸入的金額）
  if(amtEl&&(!amtEl.value||amtEl.value==='0')) {
    amtEl.value=share;
    showToast(`已帶入每人分攤金額 ${fmt(share)}`);
  }
}
window.autoFillFamilyShare=autoFillFamilyShare;

/* ── 明細 ── */
function renderRec(){
  const fp=document.getElementById('fPerson');
  const prevVal=fp.value||getLastRecPerson(); // 優先用目前值，否則用記憶值
  fp.innerHTML=`<option value="all">全部成員</option>`+window.members.map(m=>`<option value="${m.id}">${m.avatar} ${m.name}</option>`).join('');
  if(prevVal) fp.value=prevVal;
  saveLastRecPerson(fp.value); // 儲存目前選擇
  const kw=(document.getElementById('recSearch')?.value||'').toLowerCase().trim();
  const recs=getFilteredRecs();
  const fm=document.getElementById('fMonth')?.value||'current';
  const countEl=document.getElementById('rec_count');
  if(countEl) countEl.textContent=recs.length?`共 ${recs.length} 筆${fm==='all'?'（全部月份）':''}`:' ';
  const el=document.getElementById('rec_list');
  if(!recs.length){
    el.innerHTML=kw
      ? emptyHTML('🔍','找不到符合的記錄','試試其他關鍵字，或切換到全部月份')
      : emptyHTML('📋','本月沒有記錄','點底部「＋」開始記帳');
    return;
  }
  const hi=(text)=>kw?text.replace(new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<mark style="background:#ffe066;border-radius:2px">$1</mark>'):text;
  // 依日期分組
  const groups={};
  recs.forEach(r=>{if(!groups[r.date])groups[r.date]=[];groups[r.date].push(r);});
  const today=new Date(),todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const yest=new Date(today);yest.setDate(yest.getDate()-1);
  const yesterdayStr=`${yest.getFullYear()}-${String(yest.getMonth()+1).padStart(2,'0')}-${String(yest.getDate()).padStart(2,'0')}`;
  function dateLabel(d){
    if(d===todayStr) return '今天';
    if(d===yesterdayStr) return '昨天';
    const p=d.split('-');return `${parseInt(p[1])}月${parseInt(p[2])}日`;
  }
  el.innerHTML=Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(date=>{
    const dayRecs=groups[date];
    const dayExp=dayRecs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
    const dayInc=dayRecs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
    const dayTotalTxt=dayInc>0&&dayExp>0?`+${fmt(dayInc)} / -${fmt(dayExp)}`
      :dayInc>0?`+${fmt(dayInc)}`:`-${fmt(dayExp)}`;
    const rows=dayRecs.map(r=>{
      const isI=r.type==='income';
      const mem=window.members.find(m=>m.id===r.person);
      const cat=window.cats.find(c=>c.name===r.category);
      const icon=isI?'💰':(cat?cat.icon:'📝');
      return `<div class="rrow-wrap" id="rw_${r.id}">
        <div class="rrow-del-bg" onclick="delRecord('${r.id}')"><span>刪除</span></div>
        <div class="rrow" onclick="openEditModal('${r.id}')" style="cursor:pointer"
          ontouchstart="swipeStart(event,'${r.id}')"
          ontouchmove="swipeMove(event,'${r.id}')"
          ontouchend="swipeEnd(event,'${r.id}')">
          <div style="font-size:18px;width:26px;text-align:center;flex-shrink:0">${icon}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${hi(r.category)}${r.note?` · <span style="color:var(--text2)">${hi(r.note)}</span>`:''}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:3px">${r.person==='family'?'🏠 家庭':(mem?mem.avatar+' '+mem.name:r.person)} <span class="tag ${isI?'ti':'te'}">${isI?'收入':'支出'}</span>${r.time?` <span style="color:var(--text3)">${r.time}</span>`:''}</div>
          </div>
          <div style="font-size:15px;font-weight:500;flex-shrink:0;color:${isI?'var(--green)':'var(--red)'};margin-right:4px">${isI?'+':'-'}${fmt(r.amount)}</div>
          <span style="color:var(--text3);font-size:13px">›</span>
        </div>
      </div>`;
    }).join('');
    return `<div class="date-group">
      <div class="date-group-label"><span>${dateLabel(date)}</span><span class="date-group-total">${dayTotalTxt}</span></div>
      ${rows}
    </div>`;
  }).join('');
}

/* 拖曳排序 */
let dragId=null;
function dragStart(e,id){dragId=id;e.currentTarget.classList.add('dragging');}
function dragOver(e,id){e.preventDefault();if(id!==dragId)document.getElementById('ci_'+id)?.classList.add('drag-over');}
function dropOn(e,id){
  e.preventDefault();
  if(!dragId||id===dragId)return;
  if(!catDraft) catDraft=sortedCats(window.cats).map(c=>({...c}));
  const fromIdx=catDraft.findIndex(c=>c.id===dragId);
  const toIdx=catDraft.findIndex(c=>c.id===id);
  if(fromIdx<0||toIdx<0)return;
  const [item]=catDraft.splice(fromIdx,1);
  catDraft.splice(toIdx,0,item);
  catDraft.forEach((c,i)=>c.order=i);
  renderMembers();
}
function dragEnd(e){
  dragId=null;
  document.querySelectorAll('.cat-item').forEach(el=>el.classList.remove('dragging','drag-over'));
}
function toggleCIP(id){
  const el=document.getElementById('cip_'+id),open=el.style.display==='none';
  document.querySelectorAll('[id^="cip_"]').forEach(e=>e.style.display='none');
  if(open)el.style.display='block';
}

/* ══ 1. 金額快速加 ══ */
function previewCalc(){
  const el=document.getElementById('aAmt');
  const preview=document.getElementById('calcPreview');
  if(!el||!preview) return;
  const val=el.value.trim();
  // 只有包含運算符才顯示預覽
  if(!/[+\-*/]/.test(val)){preview.style.display='none';return;}
  try{
    // 安全計算：只允許數字和運算符
    if(!/^[\d+\-*/.() ]+$/.test(val)){preview.style.display='none';return;}
    const result=Math.round(Function('"use strict";return ('+val+')')());
    if(isNaN(result)||!isFinite(result)){preview.style.display='none';return;}
    preview.style.display='block';
    preview.textContent=`= NT$${result.toLocaleString()}`;
  }catch(e){preview.style.display='none';}
}
function evalAmt(val){
  if(!val) return 0;
  if(!/[+\-*/]/.test(val)) return parseFloat(val)||0;
  try{
    if(!/^[\d+\-*/.() ]+$/.test(val)) return parseFloat(val)||0;
    const result=Math.round(Function('"use strict";return ('+val+')')());
    return isNaN(result)||!isFinite(result)?parseFloat(val)||0:result;
  }catch(e){return parseFloat(val)||0;}
}
window.previewCalc=previewCalc;
function addAmt(v){
  const el=document.getElementById('aAmt');
  const cur=parseFloat(el.value)||0;

}

function getFilteredRecs(){
  const fp=document.getElementById('fPerson');
  const pf=fp?fp.value:'all';
  const tf=document.getElementById('fType')?.value||'all';
  const fm=document.getElementById('fMonth')?.value||'current';
  const kw=(document.getElementById('recSearch')?.value||'').toLowerCase().trim();
  let recs = fm==='all'
    ? window.records.slice()
    : getMonthRecs(pf==='all'?'all':pf);
  if(fm==='all'&&pf!=='all') recs=recs.filter(r=>r.person===pf);
  if(tf!=='all') recs=recs.filter(r=>r.type===tf);
  if(kw) recs=recs.filter(r=>(r.category+' '+(r.note||'')).toLowerCase().includes(kw));
  // 排序
  const sort=document.getElementById('fSort')?.value||'date_desc';
  if     (sort==='date_desc')   recs=recs.slice().sort((a,b)=>b.date!==a.date?b.date.localeCompare(a.date):(b.time||'').localeCompare(a.time||''));
  else if(sort==='date_asc')    recs=recs.slice().sort((a,b)=>a.date!==b.date?a.date.localeCompare(b.date):(a.time||'').localeCompare(b.time||''));
  else if(sort==='amount_desc') recs=recs.slice().sort((a,b)=>b.amount-a.amount);
  else if(sort==='amount_asc')  recs=recs.slice().sort((a,b)=>a.amount-b.amount);
  else if(sort==='cat_asc')     recs=recs.slice().sort((a,b)=>a.category.localeCompare(b.category,'zh-Hant'));
  return recs;
}

  const totalBalance=txList.reduce((s,tx)=>s+(tx.type==='in'?tx.amount:-tx.amount),0);

  if(isFamily){
    const recs=getMonthRecs('all');
    const inc=recs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
    const exp=recs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);

    const recs=getMonthRecs(memberId);

  // 依月份分組

    const mOut=txs.filter(t=>t.type==='out').reduce((s,t)=>s+t.amount,0);

    const cumBal=monthBalance[ym];
    const rows=txs.map(tx=>`
      <div class="pool-tx-row">
        <div class="pool-tx-dot ${tx.type==='in'?'pool-tx-in':'pool-tx-out'}"></div>
